services:
  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     raguser
      POSTGRES_PASSWORD: ragpass
      POSTGRES_DB:       ragdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"   # 5432 is taken by your local Postgres — we expose on 5433 instead
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://raguser:ragpass@postgres:5432/ragdb
    volumes:
      - chroma_data:/app/chroma_db
      - ./backend/app:/app/app          # only mount app code for hot reload
      - ./backend/main.py:/app/main.py  # and entry point
      - ./backend/alembic:/app/alembic  # and migrations
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  # ── Next.js frontend ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:8000
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8000          # runtime configuration visibility
      NEXT_PUBLIC_API_URL: ""                   # browser calls /api/* on same origin
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  chroma_data:
